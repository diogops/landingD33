<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Página em manutenção — Estância das Águas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }
    .icon {
      width: clamp(140px, 40vw, 260px);
      height: clamp(140px, 40vw, 260px);
      color: #fbbf24;
      animation: spin 12s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .icon { animation: none; } }
    h1 {
      margin-top: 32px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p {
      margin-top: 16px;
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #94a3b8;
      max-width: 520px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- Ícone grande centralizado de página em manutenção (engrenagem) -->
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

    <circle cx="12" cy="12" r="3"/>
  </svg>

  <h1>Página em manutenção</h1>
  <p>Estamos fazendo alguns ajustes. Volte em breve.</p>
</body>
</html>
